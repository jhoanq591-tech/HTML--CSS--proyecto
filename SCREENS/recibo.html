<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBERX — Recibo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/CSS/recibo.css">
</head>
<body>
<div class="screen">

  <div class="receipt-header">
    <a href="reserva.html" class="back-btn">‹</a>
    <div class="receipt-title-h">Receipt</div>
    <div class="spacer"></div>
  </div>

  <div class="receipt-body">

    <div class="amount-section">
      <div class="amount">$859.50</div>
      <div class="merchant">Airline Name</div>
      <div class="date">15th Oct 2024, 08:15 AM</div>
    </div>

    <div class="receipt-card">
      <div class="section-title">Flight Details</div>

      <div class="flight-route">
        <div class="route-end">
          <span class="route-icon">✈️</span>
          <span class="route-airport">JFK</span>
          <span class="route-time">10:30 AM</span>
        </div>
        <div class="route-arrow-wrap">
          <div class="route-arrow-line"></div>
        </div>
        <div class="route-end">
          <span class="route-airport">LAX</span>
          <span class="route-time">01:45 PM</span>
          <span class="route-icon" style="transform:scaleX(-1)">✈️</span>
        </div>
      </div>

      <div class="receipt-row">
        <span class="row-label">Flight Number</span>
        <span class="row-value">AN123</span>
      </div>
      <div class="receipt-row">
        <span class="row-label">Seat</span>
        <span class="row-value">24A</span>
      </div>

      <div class="divider"></div>

      <div class="receipt-row">
        <span class="row-label">Fare</span>
        <span class="row-value">$780.00</span>
      </div>
      <div class="receipt-row">
        <span class="row-label">Taxes &amp; Fees</span>
        <span class="row-value">$79.50</span>
      </div>

      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-value" style="text-decoration:line-through;opacity:0.5">$859.50</span>
      </div>

      <div class="divider"></div>

      <div class="meta-row">
        <span class="meta-icon">💳</span>
        <span class="meta-label">Payment Method</span>
        <span class="meta-value">Amex **** 5678</span>
      </div>
      <div class="meta-row" style="border-bottom:none">
        <span class="meta-icon">🏷️</span>
        <span class="meta-label">Category</span>
        <span class="receipt-tag">Travel</span>
      </div>
    </div>

  </div>

  <div class="receipt-actions">
    <a href="#" class="action-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </a>
    <a href="#" class="action-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </a>
    <a href="#" class="action-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </a>
  </div>

</div>
</body>
</html>
