<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBERX — Métodos de Pago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/CSS/métodos-de-pago.css">
</head>
<body>
<div class="screen">

  <div class="page-header">
    <a href="reserva.html" class="back-btn">‹</a>
    <div class="page-title">Payment Methods</div>
    <div class="page-title-spacer"></div>
  </div>

  <div class="payment-search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(139,147,176,0.8)" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" placeholder="Search payment methods">
  </div>

  <div class="payment-list">

    <!-- Tarjeta predeterminada -->
    <a href="recibo.html" class="payment-item">
      <div class="payment-card-icon" style="background:rgba(255,255,255,0.05)">💳</div>
      <div class="payment-info">
        <div class="payment-number">**** **** **** 1234</div>
        <div class="payment-expiry">Expires 12/25</div>
      </div>
      <div class="default-badge">Default</div>
      <div class="action-menu" onclick="event.preventDefault()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </div>
    </a>

    <!-- Tarjeta 2 -->
    <a href="recibo.html" class="payment-item">
      <div class="payment-card-icon" style="background:rgba(255,255,255,0.05)">🔲</div>
      <div class="payment-info">
        <div class="payment-number">**** **** **** 5678</div>
        <div class="payment-expiry">Expires 01/26</div>
      </div>
      <div class="payment-actions">
        <div class="action-icon edit" onclick="event.preventDefault()" title="Edit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="action-icon delete" onclick="event.preventDefault()" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </div>
      </div>
    </a>

    <!-- PayPal -->
    <a href="recibo.html" class="payment-item">
      <div class="payment-card-icon paypal-icon">P</div>
      <div class="payment-info">
        <div class="payment-number">PayPal</div>
      </div>
      <div class="payment-actions">
        <div class="action-icon edit" onclick="event.preventDefault()" title="Edit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="action-icon delete" onclick="event.preventDefault()" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </div>
      </div>
    </a>

  </div>

  <a href="recibo.html" class="add-method-btn">Add New Method</a>

</div>
</body>
</html>
